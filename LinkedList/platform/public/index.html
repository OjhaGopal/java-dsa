<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DSA Platform</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOP NAV ── */
  nav {
    background: #16213e;
    border-bottom: 1px solid #0f3460;
    padding: 0 20px;
    height: 50px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  nav .logo { font-size: 18px; font-weight: 700; color: #e94560; letter-spacing: 1px; }
  nav .topic-badge {
    background: #0f3460;
    color: #a0c4ff;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 12px;
  }

  /* ── MAIN LAYOUT ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 260px;
    background: #16213e;
    border-right: 1px solid #0f3460;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 14px 16px;
    font-size: 12px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 1px solid #0f3460;
  }
  .problem-list { overflow-y: auto; flex: 1; }
  .problem-item {
    padding: 12px 16px;
    cursor: pointer;
    border-bottom: 1px solid #0f346022;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background 0.15s;
  }
  .problem-item:hover { background: #0f3460; }
  .problem-item.active { background: #0f3460; border-left: 3px solid #e94560; }
  .problem-item .num { font-size: 11px; color: #555; width: 20px; }
  .problem-item .name { font-size: 13px; flex: 1; }
  .badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 600;
  }
  .badge.Easy   { background: #1a3a2a; color: #4caf50; }
  .badge.Medium { background: #3a2a1a; color: #ff9800; }
  .badge.Hard   { background: #3a1a1a; color: #f44336; }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #333;
    flex-shrink: 0;
  }
  .status-dot.pass { background: #4caf50; }
  .status-dot.fail { background: #f44336; }

  /* ── CONTENT AREA ── */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── SPLIT PANE ── */
  .split {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── LEFT: PROBLEM DESCRIPTION ── */
  .problem-panel {
    width: 38%;
    border-right: 1px solid #0f3460;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-tabs {
    display: flex;
    background: #16213e;
    border-bottom: 1px solid #0f3460;
    flex-shrink: 0;
  }
  .panel-tab {
    padding: 10px 18px;
    font-size: 13px;
    cursor: pointer;
    color: #888;
    border-bottom: 2px solid transparent;
  }
  .panel-tab.active { color: #e0e0e0; border-bottom-color: #e94560; }
  .problem-body { padding: 20px; overflow-y: auto; flex: 1; }
  .problem-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
    color: #fff;
  }
  .problem-meta { display: flex; gap: 10px; align-items: center; margin-bottom: 18px; }
  .problem-desc { font-size: 14px; line-height: 1.7; color: #ccc; margin-bottom: 20px; }
  .section-title { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .listnode-def {
    background: #0d1b2a;
    border: 1px solid #0f3460;
    border-radius: 6px;
    padding: 12px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: #a0c4ff;
    line-height: 1.6;
    margin-bottom: 20px;
  }
  .lc-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: #a0c4ff;
    font-size: 13px;
    text-decoration: none;
  }
  .lc-link:hover { color: #e94560; }

  /* ── RIGHT: EDITOR + OUTPUT ── */
  .editor-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .editor-toolbar {
    background: #16213e;
    border-bottom: 1px solid #0f3460;
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .editor-toolbar span { font-size: 12px; color: #888; }
  .btn {
    padding: 6px 18px;
    border: none;
    border-radius: 5px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-run    { background: #4caf50; color: #fff; margin-left: auto; }
  .btn-reset  { background: #0f3460; color: #a0c4ff; }

  #editor {
    flex: 1;
    font-family: 'Courier New', Consolas, monospace;
    font-size: 14px;
    background: #0d1b2a;
    color: #e0e0e0;
    border: none;
    outline: none;
    padding: 16px;
    resize: none;
    line-height: 1.6;
    tab-size: 4;
  }

  /* ── OUTPUT PANEL ── */
  .output-panel {
    height: 220px;
    border-top: 1px solid #0f3460;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .output-header {
    background: #16213e;
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 1px solid #0f3460;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .result-badge {
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 700;
    display: none;
  }
  .result-badge.pass { background: #1a3a2a; color: #4caf50; display: inline-block; }
  .result-badge.fail { background: #3a1a1a; color: #f44336; display: inline-block; }

  #output {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    background: #0d1b2a;
    white-space: pre;
    line-height: 1.7;
  }
  .out-pass { color: #4caf50; }
  .out-fail { color: #f44336; }
  .out-err  { color: #ff9800; }
  .out-info { color: #888; }

  .spinner {
    display: none;
    width: 14px; height: 14px;
    border: 2px solid #333;
    border-top-color: #4caf50;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0d1b2a; }
  ::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }
</style>
</head>
<body>

<nav>
  <span class="logo">⚡ DSA Platform</span>
  <span class="topic-badge">Linked List</span>
</nav>

<div class="main">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">Problems</div>
    <div class="problem-list" id="problemList"></div>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <div class="split">

      <!-- PROBLEM DESCRIPTION -->
      <div class="problem-panel">
        <div class="panel-tabs">
          <div class="panel-tab active">Description</div>
        </div>
        <div class="problem-body" id="problemBody">
          <p style="color:#555; margin-top:40px; text-align:center;">← Select a problem</p>
        </div>
      </div>

      <!-- EDITOR -->
      <div class="editor-panel">
        <div class="editor-toolbar">
          <span id="editorLabel">Java</span>
          <button class="btn btn-reset" onclick="resetCode()">Reset</button>
          <button class="btn btn-run" onclick="runCode()">▶ Run Tests</button>
        </div>
        <textarea id="editor" spellcheck="false" placeholder="Select a problem to start coding..."></textarea>

        <!-- OUTPUT -->
        <div class="output-panel">
          <div class="output-header">
            Test Results
            <div class="spinner" id="spinner"></div>
            <span class="result-badge" id="resultBadge"></span>
          </div>
          <div id="output"><span class="out-info">Run your code to see results here.</span></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
let problems = [];
let current = null;
const statuses = {};

async function init() {
  const res = await fetch('/api/problems');
  problems = await res.json();
  renderSidebar();
  if (problems.length) selectProblem(problems[0].id);
}

function renderSidebar() {
  const list = document.getElementById('problemList');
  list.innerHTML = problems.map((p, i) => `
    <div class="problem-item" id="item-${p.id}" onclick="selectProblem('${p.id}')">
      <span class="num">${i + 1}.</span>
      <span class="name">${p.title}</span>
      <span class="badge ${p.difficulty}">${p.difficulty}</span>
      <span class="status-dot ${statuses[p.id] || ''}" id="dot-${p.id}"></span>
    </div>
  `).join('');
}

async function selectProblem(id) {
  current = problems.find(p => p.id === id);
  if (!current) return;

  // sidebar highlight
  document.querySelectorAll('.problem-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`item-${id}`).classList.add('active');

  // load saved code
  const res = await fetch(`/api/code/${id}`);
  const { code } = await res.json();
  document.getElementById('editor').value = code;
  document.getElementById('editorLabel', ).textContent = `Java  —  ${current.title}`;

  // render description
  document.getElementById('problemBody').innerHTML = `
    <div class="problem-title">${current.title}</div>
    <div class="problem-meta">
      <span class="badge ${current.difficulty}">${current.difficulty}</span>
      <a class="lc-link" href="${current.link}" target="_blank">↗ LeetCode</a>
    </div>
    <div class="problem-desc">${current.description}</div>
    <div class="section-title">Definition (provided by LeetCode)</div>
    <div class="listnode-def">public class ListNode {
    int val;
    ListNode next;
    ListNode(int val) { this.val = val; }
    ListNode(int val, ListNode next) { this.val = val; this.next = next; }
}</div>
  `;

  clearOutput();
}

async function runCode() {
  if (!current) return;
  const code = document.getElementById('editor').value;

  setRunning(true);
  clearOutput();

  const res = await fetch(`/api/run/${current.id}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ code }),
  });

  const data = await res.json();
  setRunning(false);
  renderOutput(data);
}

function renderOutput(data) {
  const out = document.getElementById('output');
  const badge = document.getElementById('resultBadge');

  if (!data.success && !data.output.includes('PASS') && !data.output.includes('FAIL')) {
    out.innerHTML = `<span class="out-err">${escHtml(data.output)}</span>`;
    badge.className = 'result-badge fail';
    badge.textContent = 'Compile Error';
    statuses[current.id] = 'fail';
  } else {
    const lines = data.output.split('\n').filter(l => l.trim());
    let allPass = lines.length > 0;
    out.innerHTML = lines.map(line => {
      if (line.includes('PASS')) return `<span class="out-pass">${escHtml(line)}</span>`;
      if (line.includes('FAIL')) { allPass = false; return `<span class="out-fail">${escHtml(line)}</span>`; }
      return `<span class="out-info">${escHtml(line)}</span>`;
    }).join('\n');

    badge.className = `result-badge ${allPass ? 'pass' : 'fail'}`;
    badge.textContent = allPass ? 'All Passed ✓' : 'Some Failed ✗';
    statuses[current.id] = allPass ? 'pass' : 'fail';
  }

  // update sidebar dot
  const dot = document.getElementById(`dot-${current.id}`);
  if (dot) dot.className = `status-dot ${statuses[current.id]}`;
}

function resetCode() {
  if (!current) return;
  document.getElementById('editor').value = current.starterCode;
  clearOutput();
}

function clearOutput() {
  document.getElementById('output').innerHTML = '<span class="out-info">Run your code to see results here.</span>';
  const badge = document.getElementById('resultBadge');
  badge.className = 'result-badge';
  badge.textContent = '';
}

function setRunning(on) {
  document.getElementById('spinner').style.display = on ? 'block' : 'none';
  document.querySelector('.btn-run').disabled = on;
  document.querySelector('.btn-run').textContent = on ? '⏳ Running...' : '▶ Run Tests';
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// tab key inserts spaces in editor
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('editor').addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const el = e.target;
      const s = el.selectionStart;
      el.value = el.value.substring(0, s) + '    ' + el.value.substring(el.selectionEnd);
      el.selectionStart = el.selectionEnd = s + 4;
    }
  });
});

init();
</script>
</body>
</html>
