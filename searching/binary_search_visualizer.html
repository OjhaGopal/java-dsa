<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Binary Search Visualizer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f1a;
      --surface: #13162a;
      --card: #1a1e35;
      --border: #252a45;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --green: #43e5a0;
      --yellow: #ffd166;
      --text: #e4e8ff;
      --muted: #7a82aa;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 900;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 32px; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 820px;
      margin-bottom: 20px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
    }

    .control-group { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 0.75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

    input[type="text"], input[type="number"] {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }
    input[type="number"] { width: 110px; }
    input[type="text"] { width: 360px; }

    button {
      padding: 10px 22px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      color: #fff;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(108,99,255,0.4); }
    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-step {
      background: var(--surface);
      color: var(--yellow);
      border: 1px solid var(--yellow);
      padding: 10px 18px;
    }
    .btn-step:hover { background: rgba(255,209,102,0.1); }
    .btn-step:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Array Visualizer */
    .array-wrapper {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0 20px;
      min-height: 80px;
    }

    .cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .cell-box {
      width: 56px;
      height: 56px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.1rem;
      font-weight: 700;
      border: 2px solid var(--border);
      background: var(--surface);
      transition: all 0.35s ease;
      position: relative;
    }
    .cell-index {
      font-size: 0.65rem;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* States */
    .cell-box.inactive { opacity: 0.25; background: var(--bg); }
    .cell-box.active   { border-color: var(--accent); background: rgba(108,99,255,0.12); }
    .cell-box.mid      { border-color: var(--yellow); background: rgba(255,209,102,0.15); color: var(--yellow); transform: translateY(-4px) scale(1.08); box-shadow: 0 8px 24px rgba(255,209,102,0.25); }
    .cell-box.found    { border-color: var(--green); background: rgba(67,229,160,0.18); color: var(--green); transform: translateY(-6px) scale(1.12); box-shadow: 0 10px 30px rgba(67,229,160,0.35); }
    .cell-box.not-found { border-color: var(--accent2); background: rgba(255,101,132,0.12); }

    /* Pointer labels */
    .ptr-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }
    .ptr {
      font-size: 0.65rem;
      font-family: 'JetBrains Mono', monospace;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 700;
      display: none;
    }
    .ptr.start { background: rgba(108,99,255,0.25); color: var(--accent); }
    .ptr.mid   { background: rgba(255,209,102,0.25); color: var(--yellow); }
    .ptr.end   { background: rgba(255,101,132,0.25); color: var(--accent2); }

    /* Log */
    .log-title {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }
    .log { display: flex; flex-direction: column; gap: 8px; }

    .log-entry {
      background: var(--surface);
      border-left: 3px solid var(--border);
      border-radius: 0 8px 8px 0;
      padding: 10px 14px;
      font-size: 0.85rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      opacity: 0;
      transform: translateY(6px);
      transition: all 0.3s ease;
    }
    .log-entry.show { opacity: 1; transform: none; }
    .log-entry.step-checking { border-color: var(--yellow); color: var(--text); }
    .log-entry.step-left     { border-color: var(--accent); }
    .log-entry.step-right    { border-color: var(--accent2); }
    .log-entry.step-found    { border-color: var(--green); color: var(--green); font-weight: 700; }
    .log-entry.step-miss     { border-color: var(--accent2); color: var(--accent2); font-weight: 700; }

    /* Speed Slider */
    .slider-row { display: flex; align-items: center; gap: 12px; }
    input[type="range"] {
      -webkit-appearance: none;
      width: 120px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    .status-bar {
      text-align: center;
      font-size: 0.95rem;
      min-height: 28px;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .status-bar span { font-weight: 700; }
    .legend {
      display: flex; gap: 18px; flex-wrap: wrap; justify-content: center;
      margin-bottom: 8px;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: var(--muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
  </style>
</head>
<body>

<h1>Binary Search Visualizer</h1>
<p class="subtitle">Watch the algorithm eliminate half the array each step 🔍</p>

<!-- Controls -->
<div class="card">
  <div class="controls">
    <div class="control-group">
      <label>Array (sorted, comma-separated)</label>
      <input type="text" id="arrayInput" value="2, 3, 4, 5, 6, 7, 8, 9, 10"/>
    </div>
    <div class="control-group">
      <label>Target</label>
      <input type="number" id="targetInput" value="5"/>
    </div>
    <div class="control-group" style="gap:10px;flex-direction:row;align-items:flex-end;">
      <button class="btn-primary" onclick="startSearch()">▶ Run</button>
      <button class="btn-step" id="stepBtn" onclick="stepOnce()" disabled>Step →</button>
      <button class="btn-secondary" onclick="resetAll()">↺ Reset</button>
    </div>
    <div class="control-group" style="margin-left:auto;">
      <label>Speed</label>
      <div class="slider-row">
        <span style="font-size:0.78rem;color:var(--muted)">Slow</span>
        <input type="range" id="speedSlider" min="200" max="1800" value="900" step="100"/>
        <span style="font-size:0.78rem;color:var(--muted)">Fast</span>
      </div>
    </div>
  </div>
</div>

<!-- Array Display -->
<div class="card">
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:rgba(108,99,255,0.5);border:1px solid var(--accent)"></div> Search range</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(255,209,102,0.4);border:1px solid var(--yellow)"></div> Mid (checking)</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(67,229,160,0.4);border:1px solid var(--green)"></div> Found!</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--bg);border:1px solid var(--border);opacity:0.5"></div> Eliminated</div>
  </div>

  <div class="ptr-row" id="ptrRow"></div>
  <div class="array-wrapper" id="arrayDisplay"></div>
  <div class="status-bar" id="statusBar">Enter an array and target, then click Run.</div>
</div>

<!-- Step Log -->
<div class="card">
  <div class="log-title">Step-by-step log</div>
  <div class="log" id="log"></div>
</div>

<script>
  let arr = [];
  let steps = [];
  let currentStep = -1;
  let autoTimer = null;

  function parseArr() {
    return document.getElementById('arrayInput').value
      .split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
  }

  function getTarget() {
    return parseInt(document.getElementById('targetInput').value);
  }

  function getSpeed() {
    // slider: 200 (fast) to 1800 (slow) → invert
    return 2000 - parseInt(document.getElementById('speedSlider').value);
  }

  function buildSteps(arr, target) {
    const steps = [];
    let start = 0, end = arr.length - 1;

    while (start <= end) {
      const mid = Math.floor(start + (end - start) / 2);
      steps.push({ start, end, mid, value: arr[mid], target, type: 'check' });

      if (arr[mid] === target) {
        steps.push({ start, end, mid, value: arr[mid], target, type: 'found' });
        return steps;
      } else if (arr[mid] > target) {
        steps.push({ start, end: mid - 1, mid, value: arr[mid], target, type: 'go_left' });
        end = mid - 1;
      } else {
        steps.push({ start: mid + 1, end, mid, value: arr[mid], target, type: 'go_right' });
        start = mid + 1;
      }
    }
    steps.push({ start, end, mid: -1, value: null, target, type: 'not_found' });
    return steps;
  }

  function renderArray(arr, step) {
    const display = document.getElementById('arrayDisplay');
    const ptrRow  = document.getElementById('ptrRow');
    display.innerHTML = '';
    ptrRow.innerHTML  = '';

    if (!arr.length) return;

    const cells = [];
    arr.forEach((val, i) => {
      const cell = document.createElement('div');
      cell.className = 'cell';

      const box = document.createElement('div');
      box.className = 'cell-box';
      box.id = `cell-${i}`;
      box.textContent = val;

      const idx = document.createElement('div');
      idx.className = 'cell-index';
      idx.textContent = i;

      cell.appendChild(box);
      cell.appendChild(idx);
      display.appendChild(cell);
      cells.push({ box, idx, cellEl: cell });

      // Pointer labels inside ptr row (placeholder, positioned later)
      const ptr = document.createElement('div');
      ptr.className = `ptr`;
      ptr.id = `ptr-${i}`;
      ptrRow.appendChild(ptr);
    });

    if (!step) return;

    // Apply states
    arr.forEach((_, i) => {
      const box = cells[i].box;
      if (step.type === 'not_found') {
        box.classList.add('not-found');
        return;
      }
      if (step.type === 'found' && i === step.mid) {
        box.classList.add('found');
        return;
      }
      if (i < step.start || i > step.end) {
        box.classList.add('inactive');
      } else if (i === step.mid && step.type === 'check') {
        box.classList.add('mid');
      } else {
        box.classList.add('active');
      }
    });

    // Pointer badges under cells
    if (step.type !== 'not_found') {
      const labels = [];
      if (step.start === step.mid && step.start === step.end) {
        labels.push({ i: step.start, cls: 'start', text: 'start/mid/end' });
      } else {
        if (step.start !== undefined) labels.push({ i: step.start, cls: 'start', text: 'start' });
        if (step.mid !== undefined && step.mid >= 0) labels.push({ i: step.mid, cls: 'mid', text: 'mid' });
        if (step.end !== undefined && step.end >= step.start) labels.push({ i: step.end, cls: 'end', text: 'end' });
      }

      // Group by index
      const byIndex = {};
      labels.forEach(l => {
        if (!byIndex[l.i]) byIndex[l.i] = [];
        byIndex[l.i].push(l);
      });

      const ptrRow = document.getElementById('ptrRow');
      ptrRow.innerHTML = '';
      ptrRow.style.display = 'flex';

      // Build pointer row aligned with cells
      arr.forEach((_, i) => {
        const slot = document.createElement('div');
        slot.style.width = '64px';
        slot.style.display = 'flex';
        slot.style.flexDirection = 'column';
        slot.style.alignItems = 'center';
        slot.style.gap = '2px';

        if (byIndex[i]) {
          byIndex[i].forEach(l => {
            const p = document.createElement('div');
            p.className = `ptr ${l.cls}`;
            p.textContent = l.text;
            p.style.display = 'block';
            slot.appendChild(p);
          });
        }
        ptrRow.appendChild(slot);
      });
    }
  }

  function logStep(step, index) {
    const log = document.getElementById('log');
    const entry = document.createElement('div');
    entry.className = 'log-entry';

    const stepNum = `[Step ${index + 1}] `;

    if (step.type === 'check') {
      entry.classList.add('step-checking');
      entry.textContent = `${stepNum}mid = ${step.mid}  →  arr[${step.mid}] = ${step.value}  |  target = ${step.target}  →  Comparing...`;
    } else if (step.type === 'go_left') {
      entry.classList.add('step-left');
      entry.textContent = `${stepNum}${step.value} > ${step.target}  →  Search LEFT half  (end = ${step.end})`;
    } else if (step.type === 'go_right') {
      entry.classList.add('step-right');
      entry.textContent = `${stepNum}${step.value} < ${step.target}  →  Search RIGHT half  (start = ${step.start})`;
    } else if (step.type === 'found') {
      entry.classList.add('step-found');
      entry.textContent = `✅  Found ${step.target} at index ${step.mid}!`;
    } else if (step.type === 'not_found') {
      entry.classList.add('step-miss');
      entry.textContent = `❌  Target ${step.target} not found in array.`;
    }

    log.appendChild(entry);
    requestAnimationFrame(() => entry.classList.add('show'));
    entry.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function updateStatus(step) {
    const bar = document.getElementById('statusBar');
    if (!step) { bar.textContent = ''; return; }
    if (step.type === 'check') {
      bar.innerHTML = `Checking index <span>${step.mid}</span> → value <span>${step.value}</span>, target <span>${step.target}</span>`;
    } else if (step.type === 'go_left') {
      bar.innerHTML = `<span>${step.value} > ${step.target}</span> → Eliminating right half, searching left`;
    } else if (step.type === 'go_right') {
      bar.innerHTML = `<span>${step.value} < ${step.target}</span> → Eliminating left half, searching right`;
    } else if (step.type === 'found') {
      bar.innerHTML = `🎉 Target <span>${step.target}</span> found at index <span>${step.mid}</span>!`;
    } else {
      bar.innerHTML = `❌ Target <span>${step.target}</span> not in array.`;
    }
  }

  function applyStep(i) {
    if (i < 0 || i >= steps.length) return;
    currentStep = i;
    const step = steps[i];
    renderArray(arr, step);
    logStep(step, i);
    updateStatus(step);

    const done = step.type === 'found' || step.type === 'not_found';
    document.getElementById('stepBtn').disabled = done || currentStep >= steps.length - 1;
  }

  function stepOnce() {
    if (currentStep + 1 < steps.length) applyStep(currentStep + 1);
  }

  function startSearch() {
    clearTimeout(autoTimer);
    arr    = parseArr();
    const target = getTarget();

    if (!arr.length) { alert('Please enter a valid array.'); return; }
    if (isNaN(target)) { alert('Please enter a valid target.'); return; }

    // Sort silently and update input
    arr.sort((a, b) => a - b);
    document.getElementById('arrayInput').value = arr.join(', ');

    // Reset
    document.getElementById('log').innerHTML = '';
    steps = buildSteps(arr, target);
    currentStep = -1;
    renderArray(arr, null);
    document.getElementById('ptrRow').innerHTML = '';
    document.getElementById('statusBar').textContent = 'Starting search…';
    document.getElementById('stepBtn').disabled = false;

    playAuto();
  }

  function playAuto() {
    const speed = getSpeed();
    function tick() {
      if (currentStep + 1 >= steps.length) return;
      applyStep(currentStep + 1);
      const done = steps[currentStep].type === 'found' || steps[currentStep].type === 'not_found';
      if (!done) autoTimer = setTimeout(tick, speed);
      else document.getElementById('stepBtn').disabled = true;
    }
    autoTimer = setTimeout(tick, 400);
  }

  function resetAll() {
    clearTimeout(autoTimer);
    steps = []; currentStep = -1;
    document.getElementById('arrayDisplay').innerHTML = '';
    document.getElementById('ptrRow').innerHTML = '';
    document.getElementById('log').innerHTML = '';
    document.getElementById('statusBar').textContent = 'Enter an array and target, then click Run.';
    document.getElementById('stepBtn').disabled = true;
  }

  // Initial render
  arr = parseArr();
  renderArray(arr, null);
</script>
</body>
</html>
